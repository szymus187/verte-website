<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Verte — Wkrótce</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='32' height='32' rx='6' fill='%23245f40'/%3E%3Cpath d='M16 6L8 11v10l8 5 8-5V11L16 6z' fill='white' opacity='.9'/%3E%3C/svg%3E">
    <meta name="theme-color" content="#245f40">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf8f5;
            --verte-700: #245f40;
            --verte-600: #247f4d;
            --verte-900: #143a26;
            --verte-950: #0d2418;
            --verte-200: #89cca7;
            --verte-50: #e8f5ee;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--cream);
            font-family: 'Outfit', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 48px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--verte-700);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-text {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--verte-900);
            letter-spacing: -0.02em;
        }
        h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            color: var(--verte-950);
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--verte-600);
        }
        .subtitle {
            color: #6b7280;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Password gate */
        .gate { display: block; }
        .content { display: none; }
        .unlocked .gate { display: none; }
        .unlocked .content { display: block; }

        .input-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        input[type="password"] {
            flex: 1;
            background: white;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px 18px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--verte-950);
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: var(--verte-700);
            box-shadow: 0 0 0 4px rgba(36, 95, 64, 0.08);
        }
        input[type="password"]::placeholder {
            color: #9ca3af;
        }
        button {
            background: var(--verte-700);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover {
            background: var(--verte-600);
        }
        button:active {
            transform: scale(0.97);
        }
        .error {
            color: #ef4444;
            font-size: 0.8rem;
            height: 20px;
        }

        /* Coming soon content */
        .coming-soon {
            margin-top: 48px;
        }
        .coming-soon p {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .email-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--verte-700);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .email-link:hover {
            color: var(--verte-600);
        }
        .divider {
            width: 40px;
            height: 2px;
            background: var(--verte-200);
            border-radius: 1px;
            margin: 32px auto;
        }
        .footer-text {
            color: #9ca3af;
            font-size: 0.75rem;
        }

        /* Subtle animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container > * {
            animation: fadeUp 0.6s ease both;
        }
        .container > *:nth-child(2) { animation-delay: 0.1s; }
        .container > *:nth-child(3) { animation-delay: 0.15s; }
        .container > *:nth-child(4) { animation-delay: 0.2s; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1L2 5v6l6 4 6-4V5L8 1z" fill="white" opacity=".9"/>
                    <path d="M8 5v6M5 7l3 2 3-2" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
                </svg>
            </div>
            <span class="logo-text">Verte</span>
        </div>

        <h1>Coś nowego<br><em>nadchodzi</em></h1>
        <p class="subtitle">Pracujemy nad nową wersją verte.one</p>

        <!-- Password gate -->
        <div class="gate">
            <div class="input-wrap">
                <input type="password" id="pwd" placeholder="Hasło dostępu" autocomplete="off" autofocus>
                <button onclick="checkPwd()">Wejdź</button>
            </div>
            <p class="error" id="err"></p>
        </div>

        <div class="divider" style="margin-top:48px"></div>
        <p class="footer-text">&copy; 2026 Verte</p>
    </div>

    <script>
        const HASH = '00bb001852ee561dd9c80a231af788861258d02dcf559d590b51b2dfa169184d';

        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPwd() {
            const input = document.getElementById('pwd').value;
            const hash = await sha256(input);
            if (hash === HASH) {
                sessionStorage.setItem('verte_unlocked', '1');
                window.location.href = 'site.html';
            } else {
                document.getElementById('err').textContent = 'Nieprawidłowe hasło';
                document.getElementById('pwd').value = '';
                document.getElementById('pwd').focus();
            }
        }

        document.getElementById('pwd').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPwd();
        });

        if (sessionStorage.getItem('verte_unlocked') === '1') {
            window.location.href = 'site.html';
        }
    </script>
</body>
</html>
